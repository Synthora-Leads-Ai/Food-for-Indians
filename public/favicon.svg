<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#FF6B35" stroke="#FFD700" stroke-width="3"/>
  
  <!-- Thali (Plate) -->
  <circle cx="50" cy="50" r="38" fill="#FFF9F0" stroke="#FF6B35" stroke-width="2"/>
  
  <!-- Inner decorative circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#FFB84D" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Center Bowl (Main Curry) -->
  <circle cx="50" cy="50" r="12" fill="#FF6B35"/>
  <ellipse cx="50" cy="48" rx="10" ry="3" fill="#FF9933" opacity="0.7"/>
  
  <!-- Small Bowls Around (Chutneys/Sides) -->
  <!-- Top -->
  <circle cx="50" cy="28" r="6" fill="#F7B801"/>
  <ellipse cx="50" cy="27" rx="5" ry="2" fill="#FFD700" opacity="0.7"/>
  
  <!-- Right -->
  <circle cx="68" cy="50" r="6" fill="#00C853"/>
  <ellipse cx="68" cy="49" rx="5" ry="2" fill="#69F0AE" opacity="0.7"/>
  
  <!-- Bottom -->
  <circle cx="50" cy="72" r="6" fill="#D81B60"/>
  <ellipse cx="50" cy="71" rx="5" ry="2" fill="#FF4081" opacity="0.7"/>
  
  <!-- Left -->
  <circle cx="32" cy="50" r="6" fill="#9C27B0"/>
  <ellipse cx="32" cy="49" rx="5" ry="2" fill="#CE93D8" opacity="0.7"/>
  
  <!-- Roti/Chapati (Top Right) -->
  <circle cx="65" cy="35" r="8" fill="#FFE0B2" stroke="#FF9933" stroke-width="1.5"/>
  <circle cx="65" cy="35" r="6" fill="none" stroke="#FFB84D" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Rice (Bottom Left) -->
  <circle cx="35" cy="65" r="8" fill="#FFFFFF" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="32" y1="65" x2="38" y2="65" stroke="#FFE082" stroke-width="0.5"/>
  <line x1="33" y1="63" x2="37" y2="67" stroke="#FFE082" stroke-width="0.5"/>
  <line x1="33" y1="67" x2="37" y2="63" stroke="#FFE082" stroke-width="0.5"/>
  
  <!-- Decorative dots -->
  <circle cx="42" cy="38" r="1.5" fill="#FF6B35" opacity="0.6"/>
  <circle cx="58" cy="38" r="1.5" fill="#FF6B35" opacity="0.6"/>
  <circle cx="42" cy="62" r="1.5" fill="#FF6B35" opacity="0.6"/>
  <circle cx="58" cy="62" r="1.5" fill="#FF6B35" opacity="0.6"/>
</svg>